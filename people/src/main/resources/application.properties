# ============================================
# DATASOURCE - POSTGRESQL
# ============================================
spring.datasource.url=jdbc:postgresql://localhost:15434/people
spring.datasource.username=postgres
spring.datasource.password=People
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================
# HIKARI CONNECTION POOL (Spring Boot usa Hikari por defecto)
# ============================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=HikariPool-People

# ============================================
# JPA / HIBERNATE
# ============================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
