# ============================================
# DEV - LOCAL
# ============================================

spring.datasource.url=jdbc:postgresql://localhost:15434/postgres
spring.datasource.username=postgres
spring.datasource.password=People

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=people

# PayPal: usa la variable de entorno si existe, si no usa el valor por defecto
paypal.client-id=${PAYPAL_CLIENT_ID:sandbox_client_id}
paypal.client-secret=${PAYPAL_CLIENT_SECRET:sandbox_client_secret}
paypal.mode=${PAYPAL_MODE:sandbox}

# ============================================
# ACTUATOR - PERMITIR HEALTH
# ============================================

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true