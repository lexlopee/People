# ============================================
# DEV - LOCAL
# ============================================

spring.datasource.url=jdbc:postgresql://localhost:15434/postgres
spring.datasource.username=postgres
spring.datasource.password=People

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=people

# PayPal
paypal.client-id=${PAYPAL_CLIENT_ID:sandbox_client_id}
paypal.client-secret=${PAYPAL_CLIENT_SECRET:sandbox_client_secret}
paypal.mode=${PAYPAL_MODE:sandbox}

# Upload folder for campaign images
upload.dir=uploads/campanias

# Max file size 5MB
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ============================================
# ACTUATOR
# ============================================

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true