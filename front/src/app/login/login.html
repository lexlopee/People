<div class="min-h-screen bg-[#FCF4FB] flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md">

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-xl overflow-hidden">

      <!-- Cabecera morada -->
      <div class="bg-[#755D7A] px-8 py-8 text-center">
        <img src="/assets/img/LogoPeople.png" alt="Logo People" class="w-14 h-14 object-contain mx-auto mb-3" />
        <h1 class="text-2xl font-bold text-white">People</h1>
        <p class="text-[#FCF4FB] text-sm mt-1 opacity-80">{{ 'AUTH.LOGIN_SUBTITLE' | translate }}</p>
      </div>

      <!-- Formulario -->
      <div class="px-8 py-8">
        <h2 class="text-xl font-semibold text-[#755D7A] mb-6">{{ 'AUTH.LOGIN_TITLE' | translate }}</h2>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>

          <!-- Email -->
          <div class="mb-5">
            <label class="block text-sm font-medium text-gray-700 mb-1">
              {{ 'AUTH.EMAIL' | translate }}
            </label>
            <input
              type="email"
              formControlName="email"
              class="w-full px-4 py-2.5 border rounded-lg text-gray-800 focus:outline-none focus:ring-2 focus:ring-[#755D7A] transition"
              [class.border-red-400]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
              [class.border-gray-300]="!(loginForm.get('email')?.invalid && loginForm.get('email')?.touched)"
              placeholder="{{ 'AUTH.EMAIL_PLACEHOLDER' | translate }}"
            />
            <p *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
               class="text-red-500 text-xs mt-1">
              {{ 'AUTH.EMAIL_ERROR' | translate }}
            </p>
          </div>

          <!-- Contraseña -->
          <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-1">
              {{ 'AUTH.PASSWORD' | translate }}
            </label>
            <div class="relative">
              <input
                [type]="showPassword ? 'text' : 'password'"
                formControlName="password"
                class="w-full px-4 py-2.5 border rounded-lg text-gray-800 focus:outline-none focus:ring-2 focus:ring-[#755D7A] transition pr-12"
                [class.border-red-400]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
                [class.border-gray-300]="!(loginForm.get('password')?.invalid && loginForm.get('password')?.touched)"
                placeholder="{{ 'AUTH.PASSWORD_PLACEHOLDER' | translate }}"
              />
              <button type="button" (click)="togglePassword()"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-[#755D7A] transition">
                {{ showPassword ? '🙈' : '👁️' }}
              </button>
            </div>
            <p *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
               class="text-red-500 text-xs mt-1">
              {{ 'AUTH.PASSWORD_ERROR' | translate }}
            </p>
          </div>

          <!-- Botón submit -->
          <button
            type="submit"
            [disabled]="loginForm.invalid"
            class="w-full py-3 bg-[#755D7A] text-white font-semibold rounded-lg hover:bg-[#7F468A] transition disabled:opacity-50 disabled:cursor-not-allowed">
            {{ 'AUTH.LOGIN_BTN' | translate }}
          </button>

        </form>

        <!-- Enlace a registro -->
        <p class="text-center text-sm text-gray-500 mt-6">
          {{ 'AUTH.NO_ACCOUNT' | translate }}
          <a routerLink="/register" class="text-[#755D7A] font-semibold hover:text-[#7F468A] transition">
            {{ 'AUTH.GO_REGISTER' | translate }}
          </a>
        </p>
      </div>
    </div>

  </div>
</div>
