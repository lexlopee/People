<div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4 p-6">
  <a
    *ngFor="let cat of categorias"
    [routerLink]="['/categoria', cat.slug]"
    class="bg-white shadow-md rounded-lg p-4 flex flex-col items-center justify-center gap-2 cursor-pointer hover:bg-[#FFD3A1] transition text-center text-sm font-medium text-gray-700 no-underline"
  >
    <span class="text-2xl">{{ cat.icon }}</span>
    <span>{{ cat.key | translate }}</span>
  </a>
</div>
