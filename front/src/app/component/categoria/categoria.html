<!-- Cargando -->
<div *ngIf="cargando" class="flex justify-center items-center py-20">
  <div class="flex flex-col items-center gap-3 text-[#755D7A]">
    <div class="w-10 h-10 border-4 border-[#755D7A] border-t-transparent rounded-full animate-spin"></div>
    <p class="text-sm opacity-70">Cargando categorías...</p>
  </div>
</div>

<!-- Error -->
<div *ngIf="error && !cargando"
     class="max-w-md mx-auto mt-10 px-4 py-3 bg-red-50 border border-red-200 rounded-xl text-red-600 text-sm text-center">
  ⚠️ {{ error }}
  <button (click)="cargarCategorias()" class="block mx-auto mt-2 text-[#755D7A] underline text-xs">
    Reintentar
  </button>
</div>

<!-- Contenido -->
<div *ngIf="!cargando" class="max-w-7xl mx-auto px-6 py-8">

  <!-- Cabecera -->
  <div class="flex items-center justify-between mb-6 flex-wrap gap-3">
    <div>
      <h1 class="text-2xl font-bold text-[#755D7A]">Categorías</h1>
      <p class="text-sm text-gray-500 mt-1">{{ categorias.length }} categorías disponibles</p>
    </div>

    <!-- Botón "Nueva categoría": SOLO administrador -->
    <button *ngIf="authService.esAdmin()"
      (click)="mostrarFormulario = !mostrarFormulario"
      class="flex items-center gap-2 px-4 py-2 bg-[#755D7A] text-white rounded-lg hover:bg-[#7F468A] transition font-semibold text-sm">
      {{ mostrarFormulario ? '✕ Cancelar' : '＋ Nueva categoría' }}
    </button>
  </div>

  <!-- Éxito -->
  <div *ngIf="mensajeExito"
       class="mb-4 px-4 py-3 bg-green-50 border border-green-200 rounded-xl text-green-700 text-sm">
    ✅ {{ mensajeExito }}
  </div>

  <!-- Formulario nueva categoría: SOLO administrador -->
  <div *ngIf="mostrarFormulario && authService.esAdmin()"
       class="mb-8 bg-white rounded-2xl shadow-md border border-purple-100 p-6">
    <h2 class="text-lg font-bold text-[#755D7A] mb-4">Nueva categoría</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Nombre *</label>
        <input type="text" [(ngModel)]="nuevaNombre"
          class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#755D7A]"
          placeholder="Ej: Tecnología" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Descripción</label>
        <input type="text" [(ngModel)]="nuevaDescripcion"
          class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#755D7A]"
          placeholder="Descripción opcional" />
      </div>
    </div>
    <button (click)="crearCategoria()" [disabled]="!nuevaNombre.trim() || guardando"
      class="mt-4 px-6 py-2.5 bg-[#755D7A] text-white rounded-lg hover:bg-[#7F468A] transition font-semibold text-sm disabled:opacity-50">
      {{ guardando ? '⏳ Guardando...' : 'Crear categoría' }}
    </button>
  </div>

  <!-- Grid de categorías -->
  <div *ngIf="categorias.length > 0"
       class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4">
    <a *ngFor="let cat of categorias"
       [routerLink]="['/categoria', getSlug(cat.nombre)]"
       class="bg-white shadow-md rounded-xl p-4 flex flex-col items-center justify-center gap-2
              hover:bg-[#FFD3A1] hover:shadow-lg transition-all text-center text-sm
              font-medium text-gray-700 no-underline group cursor-pointer">
      <span class="text-3xl group-hover:scale-110 transition-transform">{{ getIcono(cat.nombre) }}</span>
      <span class="font-semibold leading-tight">{{ cat.nombre }}</span>
    </a>
  </div>

  <!-- Sin datos -->
  <div *ngIf="categorias.length === 0 && !cargando" class="text-center py-20 text-gray-400">
    <span class="text-5xl">📂</span>
    <p class="mt-4 text-lg font-medium">No hay categorías todavía</p>
    <p *ngIf="authService.esAdmin()" class="text-sm mt-1 text-[#755D7A]">
      Usa el botón de arriba para crear la primera
    </p>
  </div>

</div>
